name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "Deploying to EC2 instance..."
          
          # Create deployment directory if it doesn't exist
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "mkdir -p $DEPLOY_PATH"
          
          # Copy files to EC2
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.env' \
            ./ $EC2_USER@$EC2_HOST:$DEPLOY_PATH/
          
          echo "Files deployed successfully!"

      - name: Restart web server (if applicable)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            # Uncomment and modify based on your web server:
            
            # For Nginx:
            # sudo systemctl restart nginx
            
            # For Apache:
            # sudo systemctl restart apache2
            
            # For PM2 (Node.js):
            # cd ${{ secrets.DEPLOY_PATH }} && pm2 restart all
            
            echo "Deployment completed successfully!"
          EOF

      - name: Deployment status
        if: success()
        run: echo "✅ Deployment to EC2 successful!"

      - name: Deployment failed
        if: failure()
        run: echo "❌ Deployment to EC2 failed!"
